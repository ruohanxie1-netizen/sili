function compressImg(dataUrl,maxW,maxH,q,cb){var img=new Image();img.onload=function(){var w=img.width,h=img.height;if(w>maxW||h>maxH){var r=Math.min(maxW/w,maxH/h);w=Math.round(w*r);h=Math.round(h*r);}var cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);cb(cv.toDataURL('image/jpeg',q));};img.onerror=function(){cb(dataUrl);};img.src=dataUrl;}

function trySave(key,val){try{localStorage.setItem(key,val);return true;}catch(e){return false;}}

/* ===== IndexedDB 大数据存储 ===== */
var idb=null;
function idbOpen(cb){if(idb){cb(idb);return;}try{var req=indexedDB.open('snow-db',1);req.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv');};req.onsuccess=function(e){idb=e.target.result;cb(idb);};req.onerror=function(){cb(null);};}catch(e){cb(null);}}
function idbSet(key,val,cb){idbOpen(function(db){if(!db){if(cb)cb(false);return;}try{var tx=db.transaction('kv','readwrite');tx.objectStore('kv').put(val,key);tx.oncomplete=function(){if(cb)cb(true);};tx.onerror=function(){if(cb)cb(false);};}catch(e){if(cb)cb(false);}});}
function idbGet(key,cb){idbOpen(function(db){if(!db){cb(null);return;}try{var tx=db.transaction('kv','readonly');var r=tx.objectStore('kv').get(key);r.onsuccess=function(){cb(r.result!==undefined?r.result:null);};r.onerror=function(){cb(null);};}catch(e){cb(null);}});}

$('ckSiteBgBtn').onclick=function(){$('ckBgFileInput').value='';$('ckBgFileInput').click();};
$('ckBgFileInput').onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){compressImg(r.result,600,600,0.6,function(d){ckBgData=d;$('ckSiteBgStatus').textContent='已选择';});};r.readAsDataURL(f);$('ckBgFileInput').value='';};
$('ckSiteConfirm').onclick=function(){var name=$('ckSiteName').value.trim();var url=$('ckSiteUrl').value.trim();var note=$('ckSiteNote').value.trim();var cd=parseInt($('ckSiteCooldown').value,10)||24;if(!name){alert('请输入站点名称');return;}if(!url){alert('请输入站点链接');return;}if(!/^https?:\/\//i.test(url))url='https://'+url;if(ckEditId){var s=ckData.sites.find(function(x){return x.id===ckEditId;});if(s){s.name=name;s.url=url;s.note=note;s.cooldown=cd;if(ckBgData!==null)s.bg=ckBgData;}}else{ckData.sites.push({id:uid(),name:name,url:url,note:note,cooldown:cd,bg:ckBgData,lastCheck:null});}saveCk();renderCkList();$('ckSiteModal').classList.remove('active');ckBgData=null;};
setInterval(function(){if($('ckPanelOverlay').classList.contains('active'))renderCkList();},60000);

function renderMnClouds(){var c=$('mnClouds');c.innerHTML='';for(var i=0;i<4;i++){var cl=document.createElement('div');cl.className='mn-cloud';var w=80+Math.random()*120;cl.style.cssText='width:'+w+'px;height:'+(w*0.6)+'px;top:'+(Math.random()*60)+'%;animation-duration:'+(25+Math.random()*20)+'s;animation-delay:-'+Math.random()*15+'s;opacity:'+(0.3+Math.random()*0.3);c.appendChild(cl);}}
function renderMnStars(){var bg=$('mnStars');bg.innerHTML='';var symbols=['✦','✧','⋆','✶','·','✷','⁕'];for(var i=0;i<25;i++){var s=document.createElement('span');s.className='mn-star';s.textContent=symbols[Math.floor(Math.random()*symbols.length)];var size=6+Math.random()*10;s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;font-size:'+size+'px;animation-duration:'+(2+Math.random()*3)+'s;animation-delay:-'+Math.random()*3+'s';bg.appendChild(s);}}
function renderMnCats(){var row=$('mnCatsRow');row.innerHTML='';var allPill=document.createElement('button');allPill.className='mn-cat-pill'+(mnActiveCat==='全部'?' active':'');allPill.textContent='全部';allPill.onclick=function(){mnActiveCat='全部';renderMnCats();renderMnGrid();};row.appendChild(allPill);mnData.categories.forEach(function(cat){var pill=document.createElement('button');pill.className='mn-cat-pill'+(mnActiveCat===cat?' active':'');pill.textContent=cat;pill.onclick=function(){mnActiveCat=cat;renderMnCats();renderMnGrid();};var lt=null,lp=false;pill.onmousedown=pill.ontouchstart=function(){lp=false;lt=setTimeout(function(){lp=true;pill.classList.add('shaking');var act=prompt('输入新名称，或输入"删除"来删除分类「'+cat+'」',cat);if(act===null){pill.classList.remove('shaking');return;}act=act.trim();if(act==='删除'){mnData.categories=mnData.categories.filter(function(c){return c!==cat;});mnData.photos.forEach(function(p){if(p.cat===cat)p.cat=mnData.categories[0]||'默认';});if(!mnData.categories.length)mnData.categories.push('默认');if(mnActiveCat===cat)mnActiveCat='全部';}else if(act&&act!==cat){if(mnData.categories.indexOf(act)>=0){alert('分类名已存在');pill.classList.remove('shaking');return;}var ci=mnData.categories.indexOf(cat);if(ci>=0)mnData.categories[ci]=act;mnData.photos.forEach(function(p){if(p.cat===cat)p.cat=act;});if(mnActiveCat===cat)mnActiveCat=act;}pill.classList.remove('shaking');saveMn();renderMnCats();renderMnGrid();},600);};pill.onmouseup=pill.onmouseleave=pill.ontouchend=pill.ontouchcancel=function(){if(lt){clearTimeout(lt);lt=null;}};row.appendChild(pill);});}
$('mnAddCatBtn').onclick=function(){var name=prompt('输入新分类名称');if(!name||!name.trim())return;name=name.trim();if(mnData.categories.indexOf(name)>=0){alert('分类已存在');return;}mnData.categories.push(name);mnActiveCat=name;saveMn();renderMnCats();renderMnGrid();};
$('mnAddBtn').onclick=function(){$('mnFileInput').value='';$('mnFileInput').click();};
$('mnFileInput').onchange=function(e){var files=Array.from(e.target.files);if(!files.length)return;var targetCat=(mnActiveCat==='全部')?(mnData.categories[0]||'默认'):mnActiveCat;var done=0;files.forEach(function(f){var r=new FileReader();r.onload=function(){compressImg(r.result,1400,1400,0.75,function(d){mnData.photos.push({id:uid(),name:f.name.replace(/\.[^.]+$/,''),data:d,time:Date.now(),cat:targetCat});done++;if(done===files.length){saveMn();renderMnGrid();}});};r.readAsDataURL(f);});$('mnFileInput').value='';};
function renderMnGrid(){var grid=$('mnGrid');grid.innerHTML='';var filtered=mnData.photos.slice();if(mnActiveCat!=='全部'){filtered=filtered.filter(function(p){return p.cat===mnActiveCat;});}if(!filtered.length){var em=document.createElement('div');em.className='mn-empty';em.textContent=mnData.photos.length?'该分类下还没有照片':'还没有照片，点击右上角上传吧';grid.appendChild(em);return;}var sorted=filtered.slice().reverse();sorted.forEach(function(photo){var card=document.createElement('div');card.className='mn-card';var img=document.createElement('img');img.src=photo.data;img.alt=photo.name;img.loading='lazy';card.appendChild(img);var ov=document.createElement('div');ov.className='mn-card-overlay';ov.textContent=(photo.name||'未命名')+(photo.cat?' · '+photo.cat:'');card.appendChild(ov);var del=document.createElement('button');del.className='mn-card-del';del.textContent='×';del.onclick=function(e){e.stopPropagation();if(confirm('删除这张图片？')){mnData.photos=mnData.photos.filter(function(p){return p.id!==photo.id;});saveMn();renderMnGrid();}};card.appendChild(del);card.onclick=function(e){if(e.target===del)return;openMnViewer(photo);};var lt=null;card.onmousedown=card.ontouchstart=function(){lt=setTimeout(function(){renderMnGrid();},600);};card.onmouseup=card.onmouseleave=card.ontouchend=card.ontouchcancel=function(){if(lt){clearTimeout(lt);lt=null;}};grid.appendChild(card);});}
function openMnViewer(photo){$('mnViewerImg').src=photo.data;$('mnViewerName').textContent=photo.name||'未命名';$('mnViewer').classList.add('active');}
function closeMnViewer(){$('mnViewer').classList.remove('active');}
$('mnViewerClose').onclick=closeMnViewer;
$('mnViewer').onclick=function(e){if(e.target===$('mnViewer'))closeMnViewer();};
$('mnViewerDl').onclick=function(){if(!mnData.photos.length)return;var photo=mnData.photos.find(function(p){return p.data===$('mnViewerImg').src;});if(!photo)return;var a=document.createElement('a');a.href=photo.data;a.download=(photo.name||'image')+'.jpg';document.body.appendChild(a);a.click();document.body.removeChild(a);};
$('mnViewerDel').onclick=function(){if(!mnData.photos.length)return;var photo=mnData.photos.find(function(p){return p.data===$('mnViewerImg').src;});if(!photo)return;if(confirm('删除这张图片？')){mnData.photos=mnData.photos.filter(function(p){return p.id!==photo.id;});saveMn();renderMnGrid();closeMnViewer();}};
$('mnViewerRename').onclick=function(){if(!mnData.photos.length)return;var photo=mnData.photos.find(function(p){return p.data===$('mnViewerImg').src;});if(!photo)return;$('mnRenameInput').value=photo.name||'';$('mnRenameModal').classList.add('active');setTimeout(function(){$('mnRenameInput').focus();},100);};
$('mnRenameCancel').onclick=function(){$('mnRenameModal').classList.remove('active');};
$('mnRenameModal').onclick=function(e){if(e.target===$('mnRenameModal'))$('mnRenameModal').classList.remove('active');};
$('mnRenameConfirm').onclick=function(){var nm=$('mnRenameInput').value.trim();if(!nm)return;var photo=mnData.photos.find(function(p){return p.data===$('mnViewerImg').src;});if(photo){photo.name=nm;saveMn();$('mnViewerName').textContent=nm;renderMnGrid();}$('mnRenameModal').classList.remove('active');};
function openMnPanel(){$('mnPanelOverlay').classList.add('active');renderMnClouds();renderMnStars();renderMnCats();renderMnGrid();}
function closeMnPanel(){$('mnPanelOverlay').classList.remove('active');}
$('mnClose').onclick=closeMnPanel;
$('mnPanelOverlay').onclick=function(e){if(e.target===$('mnPanelOverlay'))closeMnPanel();};

var snippetColors=['ice','sky','ocean','aqua','deep'];
function renderSnippetBubbles(){var bg=$('snippetBubbleBg');bg.innerHTML='';for(var i=0;i<6;i++){var bubble=document.createElement('div');bubble.className='snippet-bubble';var size=60+Math.random()*140;bubble.style.cssText='width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;animation-duration:'+(20+Math.random()*15)+'s;animation-delay:-'+Math.random()*20+'s';bg.appendChild(bubble);}}
function renderSnippetColors(){var bar=$('snippetColorBar');bar.innerHTML='';snippetColors.forEach(function(col){var dot=document.createElement('div');dot.className='snippet-color-dot '+col+(col===snippetActiveColor?' active':'');dot.onclick=function(){snippetActiveColor=col;renderSnippetColors();};bar.appendChild(dot);});}
function fmtSnTime(ts){var d=new Date(ts);var now=new Date();var diff=now-d;if(diff<60000)return '刚才';if(diff<3600000)return Math.floor(diff/60000)+'分钟前';if(diff<86400000)return Math.floor(diff/3600000)+'小时前';if(diff<604800000)return Math.floor(diff/86400000)+'天前';return d.getMonth()+1+'-'+d.getDate();}
function renderSnippetGrid(){var grid=$('snippetGrid');grid.innerHTML='';if(!snippetData.items.length){var em=document.createElement('div');em.className='snippet-empty';em.textContent='还没有碎片，开始记录吧';grid.appendChild(em);return;}var sorted=snippetData.items.slice().reverse();sorted.forEach(function(item,idx){var card=document.createElement('div');var rot=Math.random()*6-3;card.style.setProperty('--rotation',rot+'deg');card.className='snippet-card '+item.color;var txt=document.createElement('div');txt.className='snippet-card-text';txt.textContent=item.text;card.appendChild(txt);var tm=document.createElement('div');tm.className='snippet-card-time';tm.textContent=fmtSnTime(item.time);card.appendChild(tm);var del=document.createElement('button');del.className='snippet-card-del';del.textContent='×';del.onclick=function(e){e.stopPropagation();snippetData.items=snippetData.items.filter(function(x){return x.id!==item.id;});saveSn();renderSnippetGrid();};card.appendChild(del);grid.appendChild(card);});}
function openSnippetPanel(){$('snippetPanelOverlay').classList.add('active');renderSnippetBubbles();renderSnippetColors();renderSnippetGrid();$('snippetInput').focus();}
function closeSnippetPanel(){$('snippetPanelOverlay').classList.remove('active');}
$('snippetClose').onclick=closeSnippetPanel;
$('snippetPanelOverlay').onclick=function(e){if(e.target===$('snippetPanelOverlay'))closeSnippetPanel();};
$('snippetAddBtn').onclick=function(){var text=$('snippetInput').value.trim();if(!text){alert('写点什么吧');return;}snippetData.items.push({id:uid(),text:text,color:snippetActiveColor,time:Date.now()});saveSn();$('snippetInput').value='';renderSnippetGrid();};
$('snippetInput').addEventListener('keypress',function(e){if(e.key==='Enter'){$('snippetAddBtn').click();}});
function updateSnippetHeartState(){if(window._snippetStarBtn){if(snippetData.items.length>0)window._snippetStarBtn.classList.add('playing');else window._snippetStarBtn.classList.remove('playing');}}

function renderDashboardStats(){var grid=$('dashboardGrid');grid.innerHTML='';updateDashboardStats();[{label:'音乐曲目',value:dashboardData.musicTracks||0,unit:'首'},{label:'收藏网站',value:dashboardData.totalSites||0,unit:'个',highlight:true},{label:'灵感碎片',value:dashboardData.snippetItems||0,unit:'条'},{label:'签到天数',value:dashboardData.checkinDays||0,unit:'天',highlight:true},{label:'签到站点',value:dashboardData.ckSites||0,unit:'个'},{label:'相册照片',value:dashboardData.mnPhotos||0,unit:'张'},{label:'文件总数',value:fileData.folders.reduce(function(t,f){return t+((f.files||[]).length+f.subs.reduce(function(st,s){return st+(s.files||[]).length;},0));},0),unit:'个'}].forEach(function(card){var el=document.createElement('div');el.className='dashboard-card'+(card.highlight?' highlight':'');el.innerHTML='<div class="dashboard-card-label">'+card.label+'</div><div class="dashboard-card-value">'+card.value+'</div><div class="dashboard-card-unit">'+card.unit+'</div>';grid.appendChild(el);});}
function updateDashboardStats(){var stats={musicTracks:musicData.tracks.length,totalSites:state.sites.length,snippetItems:snippetData.items.length,checkinDays:calData.checkins.length,ckSites:ckData.sites.length,mnPhotos:mnData.photos.length};dashboardData=stats;saveDb();}
function openDashboardPanel(){$('dashboardPanelOverlay').classList.add('active');renderDashboardDiamonds();renderDashboardStats();}
function closeDashboardPanel(){$('dashboardPanelOverlay').classList.remove('active');}
function renderDashboardDiamonds(){var diamonds=$('dashboardDiamonds');diamonds.innerHTML='';for(var i=0;i<12;i++){var diamond=document.createElement('div');diamond.className='dashboard-diamond';diamonds.appendChild(diamond);}}
$('dashboardClose').onclick=closeDashboardPanel;
$('dashboardPanelOverlay').onclick=function(e){if(e.target===$('dashboardPanelOverlay'))closeDashboardPanel();};
